name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master

env:
  FOUNDRY_PROFILE: ci

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Build contracts
        run: |
          forge --version
          forge build --sizes

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run tests
        env:
          MAINNET_RPC_URL: ${{secrets.MAINNET_RPC_URL}}
          OPTIMISM_RPC_URL: ${{secrets.OPTIMISM_RPC_URL}}
          ARBITRUM_ONE_RPC_URL: ${{secrets.ARBITRUM_ONE_RPC_URL}}
          ARBITRUM_NOVA_RPC_URL: ${{secrets.ARBITRUM_NOVA_RPC_URL}}
          GNOSIS_CHAIN_RPC_URL: ${{secrets.GNOSIS_CHAIN_RPC_URL}}
          BASE_RPC_URL: ${{secrets.BASE_RPC_URL}}
        run: FOUNDRY_PROFILE=ci forge test

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Run coverage
        env:
          MAINNET_RPC_URL: ${{secrets.MAINNET_RPC_URL}}
          OPTIMISM_RPC_URL: ${{secrets.OPTIMISM_RPC_URL}}
          ARBITRUM_ONE_RPC_URL: ${{secrets.ARBITRUM_ONE_RPC_URL}}
          ARBITRUM_NOVA_RPC_URL: ${{secrets.ARBITRUM_NOVA_RPC_URL}}
          GNOSIS_CHAIN_RPC_URL: ${{secrets.GNOSIS_CHAIN_RPC_URL}}
          BASE_RPC_URL: ${{secrets.BASE_RPC_URL}}
        run: forge coverage --report summary --report lcov

      # Coverage filter rationale:
      #   - `test/*`              -> exclude. Test code is not subject to coverage.
      #   - `script/Deploy*.s.sol` -> exclude. These are forge-script entry points whose
      #                              bodies are essentially `vm.startBroadcast` orchestration
      #                              of already-tested libraries; running them as unit tests
      #                              isn't meaningful (they need a real fork to exercise).
      #   - `deploy/*`             -> include. The deploy libraries
      #                              (DeployConfig / DeployExecutor / VerificationHelpers /
      #                              Verify / <X>ReceiverDeploy) hold the read / validate /
      #                              verify logic and are unit-tested in `test/`. Regressions
      #                              there must affect the coverage gate.
      #   - `script/BaseDeployScript.sol` -> include. Holds chain-registry / chain-selection
      #                              logic with unit tests in `test/BaseDeployScript.t.sol`.
      # The `--rc lcov_branch_coverage=1` part keeps branch info in the filtered report, since lcov
      # defaults to removing branch info.
      - name: Filter directories
        run: |
          sudo apt update && sudo apt install -y lcov
          lcov --remove lcov.info 'test/*' 'script/Deploy*.s.sol' --output-file lcov.info --rc lcov_branch_coverage=1

      # This step posts a detailed coverage report as a comment and deletes previous comments on
      # each push. The below step is used to fail coverage if the specified coverage threshold is
      # not met. The below step can post a comment (when it's `github-token` is specified) but it's
      # not as useful, and this action cannot fail CI based on a minimum coverage threshold, which
      # is why we use both in this way.
      - name: Post coverage report
        if: github.event_name == 'pull_request' # This action fails when ran outside of a pull request.
        uses: romeovs/lcov-reporter-action@v0.3.1
        with:
          delete-old-comments: true
          lcov-file: ./lcov.info
          github-token: ${{ secrets.GITHUB_TOKEN }} # Adds a coverage summary comment to the PR.

      - name: Verify minimum coverage
        uses: zgosalvez/github-actions-report-lcov@v2
        with:
          coverage-files: ./lcov.info
          minimum-coverage: 90 # Set coverage threshold.
