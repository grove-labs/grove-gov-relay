[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = '0.8.25'
optimizer = true
optimizer_runs = 200

fs_permissions = [{ access = "read", path = "./script/config" }]

remappings = [
    '@layerzerolabs/oft-evm/=lib/devtools/packages/oft-evm/',
    'layerzerolabs/oapp-evm/=lib/devtools/packages/oapp-evm/',
    '@layerzerolabs/lz-evm-protocol-v2/=lib/LayerZero-v2/packages/layerzero-v2/evm/protocol/',
    '@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/',
    '@layerzerolabs/lz-evm-messagelib-v2/=lib/LayerZero-v2/packages/layerzero-v2/evm/messagelib/',
    'solidity-bytes-utils/=lib/solidity-bytes-utils/',
]

[etherscan]
# Etherscan v2 unified key (`ETHERSCAN_API_KEY`) - one key covers every chain whose
# verifier is hosted by Etherscan. The `chain` field tells forge which chainId the
# v2 endpoint should target.
mainnet      = { key = "${ETHERSCAN_API_KEY}", chain = 1 }
optimism     = { key = "${ETHERSCAN_API_KEY}", chain = 10 }
base         = { key = "${ETHERSCAN_API_KEY}", chain = 8453 }
gnosis_chain = { key = "${ETHERSCAN_API_KEY}", chain = 100 }
arbitrum_one = { key = "${ETHERSCAN_API_KEY}", chain = 42161 }
avalanche    = { key = "${ETHERSCAN_API_KEY}", chain = 43114 }

# Non-Etherscan verifiers - these need their own dedicated API keys because the
# explorers are not part of the Etherscan v2 federation:
#   - world_chain : Alchemy-hosted explorer
#   - unichain    : Blockscout-hosted explorer
world_chain  = { key = "${WORLD_CHAIN_API_KEY}", chain = 480, url = "https://worldchain-mainnet-explorer.alchemy.com/api" }
unichain     = { key = "${UNICHAIN_API_KEY}",   chain = 130, url = "https://unichain.blockscout.com/api" }
